<script>
  (function () {
    if (typeof window.switchLang !== 'function') {
      var currentLang = 'fr';
      window.switchLang = function (lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        document.querySelectorAll('.fr-text, .fr-block').forEach(function (el) {
          var d = el.classList.contains('fr-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'fr' ? d : 'none', 'important');
        });
        document.querySelectorAll('.en-text, .en-block').forEach(function (el) {
          var d = el.classList.contains('en-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'en' ? d : 'none', 'important');
        });
        document.querySelectorAll('[data-lang]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-lang') === lang);
        });
        document.documentElement.lang = lang;
        try { localStorage.setItem('pp_lang', lang); } catch (e) { }
      };
    }
    function restoreLang() {
      try {
        var saved = localStorage.getItem('pp_lang');
        var lang = (saved === 'en') ? 'en' : 'fr';
        document.body.classList.remove('lang-fr', 'lang-en');
        document.body.classList.add('lang-' + lang);
        document.documentElement.lang = lang;
        if (lang === 'en' && typeof window.switchLang === 'function') window.switchLang('en');
      } catch (e) {
        document.body.classList.add('lang-fr');
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', restoreLang);
    else restoreLang();

    function patchOldLinks() {
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href') || '';
        if (h === '/' || h === '/index' || h.indexOf('Nettoyage de Bacs') !== -1) {
          a.setAttribute('href', '/accueil_index');
        } else if (h.indexOf('#section-') === 0) {
          a.setAttribute('href', '/accueil_index' + h);
        }
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', patchOldLinks);
    else patchOldLinks();
    setTimeout(patchOldLinks, 1000);
    setTimeout(patchOldLinks, 3000);
  })();
</script>
