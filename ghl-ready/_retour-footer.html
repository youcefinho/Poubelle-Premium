<script>
  (function () {
    if (typeof window.switchLang !== 'function') {
      var currentLang = 'fr';
      window.switchLang = function (lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        document.querySelectorAll('.fr-text, .fr-block').forEach(function (el) {
          var d = el.classList.contains('fr-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'fr' ? d : 'none', 'important');
        });
        document.querySelectorAll('.en-text, .en-block').forEach(function (el) {
          var d = el.classList.contains('en-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'en' ? d : 'none', 'important');
        });
        document.querySelectorAll('[data-lang]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-lang') === lang);
        });
        document.documentElement.lang = lang;
        try { localStorage.setItem('pp_lang', lang); } catch (e) { }
      };
    }
    function restoreLang() {
      try {
        var saved = localStorage.getItem('pp_lang');
        var lang = (saved === 'en') ? 'en' : 'fr';
        document.body.classList.remove('lang-fr', 'lang-en');
        document.body.classList.add('lang-' + lang);
        document.documentElement.lang = lang;
        if (lang === 'en' && typeof window.switchLang === 'function') window.switchLang('en');
      } catch (e) {
        document.body.classList.add('lang-fr');
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', restoreLang);
    else restoreLang();

    function initReviewsSwiper() {
      if (typeof Swiper === 'undefined') return false;
      var el = document.querySelector('.reviewsSwiper');
      if (!el || el._ppRetourSwInit) return true;
      el._ppRetourSwInit = true;
      try {
        new Swiper('.reviewsSwiper', {
          slidesPerView: 1,
          spaceBetween: 20,
          loop: true,
          autoplay: { delay: 4500, disableOnInteraction: false },
          navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
          pagination: { el: '.swiper-pagination', clickable: true },
          breakpoints: { 768: { slidesPerView: 2 }, 1100: { slidesPerView: 3 } }
        });
      } catch (e) { }
      return true;
    }
    var swTries = 0;
    var swIv = setInterval(function () {
      if (initReviewsSwiper() || swTries++ > 30) clearInterval(swIv);
    }, 100);

    function patchOldLinks() {
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href') || '';
        if (h === '/' || h === '/index' || h.indexOf('Nettoyage de Bacs') !== -1) {
          a.setAttribute('href', '/accueil_index');
        } else if (h.indexOf('#section-') === 0) {
          a.setAttribute('href', '/accueil_index' + h);
        }
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', patchOldLinks);
    else patchOldLinks();
    setTimeout(patchOldLinks, 1000);
    setTimeout(patchOldLinks, 3000);

    // ===== META PIXEL CONVERSION TRACKING =====
    // CompleteRegistration = form Retour GHL submit (g5pvDJWBSQmPuMQ9hvTu)
    var ppRegFired = false;
    window.addEventListener('message', function (e) {
      if (!e.data || ppRegFired || typeof fbq !== 'function') return;
      var d = e.data;
      var t = '';
      if (typeof d === 'object' && d) {
        t = String(d.type || d.event || d.action || d.name || d.eventName || '');
      } else if (typeof d === 'string') {
        t = d;
      }
      if (/form[:_-]?(submit|complete|done|success)|submit[:_-]?success|onSubmit|formCompleted/i.test(t)) {
        fbq('track', 'CompleteRegistration', { content_name: 'Form Retour Google reviews' });
        ppRegFired = true;
      }
    });
    // Contact = click sur lien tel:
    var ppContactFired = false;
    document.addEventListener('click', function (e) {
      var a = e.target && e.target.closest && e.target.closest('a[href^="tel:"]');
      if (a && !ppContactFired && typeof fbq === 'function') {
        fbq('track', 'Contact', { content_name: 'Click telephone Retour' });
        ppContactFired = true;
        setTimeout(function () { ppContactFired = false; }, 5000);
      }
    });
  })();
</script>
