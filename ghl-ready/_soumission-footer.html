<script>
  (function () {
    if (typeof window.switchLang !== 'function') {
      var currentLang = 'fr';
      window.switchLang = function (lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        document.querySelectorAll('.fr-text, .fr-block').forEach(function (el) {
          var d = el.classList.contains('fr-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'fr' ? d : 'none', 'important');
        });
        document.querySelectorAll('.en-text, .en-block').forEach(function (el) {
          var d = el.classList.contains('en-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'en' ? d : 'none', 'important');
        });
        document.querySelectorAll('[data-lang]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-lang') === lang);
        });
        document.documentElement.lang = lang;
        try { localStorage.setItem('pp_lang', lang); } catch (e) { }
      };
    }
    function restoreLang() {
      try {
        var saved = localStorage.getItem('pp_lang');
        if (saved && saved !== 'fr') window.switchLang(saved);
      } catch (e) { }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', restoreLang);
    else restoreLang();

    function scrollFormToTop() {
      var form = document.getElementById('_builder-form');
      if (!form) return;
      var headerH = (document.querySelector('.header-nav') || {}).offsetHeight || 80;
      var top = form.getBoundingClientRect().top + window.pageYOffset - headerH - 20;
      window.scrollTo({ top: Math.max(top, 0), behavior: 'smooth' });
    }
    window.ppScrollFormToTop = scrollFormToTop;

    function initPersoToggle() {
      document.addEventListener('change', function (e) {
        if (!e.target || e.target.name !== 'forfait_2025') return;
        var wrap = document.getElementById('forfait-perso-wrap');
        if (!wrap) return;
        var isPerso = e.target.value === 'PERSONNALISÉ';
        wrap.style.display = isPerso ? 'block' : 'none';
        var input = wrap.querySelector('input, textarea, select');
        if (input) {
          if (isPerso) input.setAttribute('required', 'required');
          else input.removeAttribute('required');
        }
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPersoToggle);
    else initPersoToggle();

    function patchOldLinks() {
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href') || '';
        if (h === '/' || h === '/index' || h.indexOf('Nettoyage de Bacs') !== -1) {
          a.setAttribute('href', '/accueil_index');
        } else if (h.indexOf('#section-') === 0) {
          a.setAttribute('href', '/accueil_index' + h);
        }
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', patchOldLinks);
    else patchOldLinks();
    setTimeout(patchOldLinks, 1000);
    setTimeout(patchOldLinks, 3000);

    // === REMPLACEMENT TOTAL du header sur Soumission ===
    // Injecte un header propre identique aux autres pages, cache le header GHL natif
    function injectSoumissionHeader() {
      if (document.getElementById('pp-injected-header')) return;

      var css = document.createElement('style');
      css.textContent = ''
        + '/* Cache le header GHL natif de Soumission */\n'
        + 'body > header:not(#pp-injected-header),\n'
        + 'body > section:first-of-type [class*="hl-header"],\n'
        + 'body > .hl-header-section,\n'
        + 'body > section.section-header {\n'
        + '  display: none !important;\n'
        + '}\n'
        + '/* Notre header injecté */\n'
        + '#pp-injected-header {\n'
        + '  position: sticky !important;\n'
        + '  top: 0 !important;\n'
        + '  left: 0 !important;\n'
        + '  width: 100% !important;\n'
        + '  z-index: 99999 !important;\n'
        + '  background: #fff !important;\n'
        + '  padding: 18px 40px !important;\n'
        + '  box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;\n'
        + '  display: flex !important;\n'
        + '  align-items: center !important;\n'
        + '  justify-content: space-between !important;\n'
        + '  font-family: "Poppins", sans-serif !important;\n'
        + '  box-sizing: border-box !important;\n'
        + '}\n'
        + '#pp-injected-header .pp-h-logo img { height: 50px !important; width: auto !important; }\n'
        + '#pp-injected-header .pp-h-nav { display: flex !important; gap: 32px !important; align-items: center !important; }\n'
        + '#pp-injected-header .pp-h-nav a { color: #1a202c !important; font-weight: 700 !important; font-size: 1rem !important; text-decoration: none !important; }\n'
        + '#pp-injected-header .pp-h-nav a:hover { color: #FE8800 !important; }\n'
        + '#pp-injected-header .pp-h-lang { display: inline-flex !important; align-items: center !important; gap: 0 !important; background: rgba(244,135,22,0.08) !important; border-radius: 99px !important; padding: 4px !important; }\n'
        + '#pp-injected-header .pp-h-lang button { border: 0 !important; background: transparent !important; padding: 6px 14px !important; cursor: pointer !important; font-weight: 700 !important; font-size: 0.85rem !important; border-radius: 99px !important; color: #4a5568 !important; }\n'
        + '#pp-injected-header .pp-h-lang button.active { background: #FE8800 !important; color: #fff !important; }\n'
        + '#pp-injected-header .pp-h-cta { background: #FE8800 !important; color: #fff !important; padding: 14px 30px !important; border-radius: 99px !important; font-weight: 700 !important; font-size: 1rem !important; text-decoration: none !important; box-shadow: 0 4px 14px rgba(254,136,0,0.35) !important; transition: all 0.3s ease !important; }\n'
        + '#pp-injected-header .pp-h-cta:hover { background: #e07700 !important; transform: translateY(-2px) !important; }\n'
        + '@media (max-width: 768px) {\n'
        + '  #pp-injected-header { padding: 14px 20px !important; }\n'
        + '  #pp-injected-header .pp-h-nav { gap: 16px !important; font-size: 0.9rem !important; }\n'
        + '  #pp-injected-header .pp-h-cta { padding: 10px 18px !important; font-size: 0.9rem !important; }\n'
        + '  #pp-injected-header .pp-h-logo img { height: 38px !important; }\n'
        + '}\n'
        + '@media (max-width: 560px) {\n'
        + '  #pp-injected-header .pp-h-nav { display: none !important; }\n'
        + '}';
      document.head.appendChild(css);

      var hdr = document.createElement('header');
      hdr.id = 'pp-injected-header';
      hdr.innerHTML = ''
        + '<a class="pp-h-logo" href="/accueil_index" aria-label="Accueil Poubelle Premium">'
        + '  <img src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/Q4K7xsLSm5SH7e2GyuSi/media/b4d29bb5-f948-4267-b7f9-e10c13637622.png" alt="Poubelle Premium"/>'
        + '</a>'
        + '<nav class="pp-h-nav">'
        + '  <a href="/accueil_index"><span class="fr-text">Accueil</span><span class="en-text">Home</span></a>'
        + '  <a href="/accueil_index#section-Q-QVu_CWVt"><span class="fr-text">Services</span><span class="en-text">Services</span></a>'
        + '  <a href="/avis-clients"><span class="fr-text">Avis clients</span><span class="en-text">Reviews</span></a>'
        + '  <span class="pp-h-lang">'
        + '    <button type="button" class="active" data-lang="fr" onclick="if(window.switchLang)window.switchLang(\'fr\')">FR</button>'
        + '    <button type="button" data-lang="en" onclick="if(window.switchLang)window.switchLang(\'en\')">EN</button>'
        + '  </span>'
        + '</nav>'
        + '<a class="pp-h-cta" href="/soumission"><span class="fr-text">Demander un devis</span><span class="en-text">Request a quote</span></a>';
      document.body.insertBefore(hdr, document.body.firstChild);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', injectSoumissionHeader);
    else injectSoumissionHeader();
    setTimeout(injectSoumissionHeader, 500);
  })();
</script>
