  EMPLACEMENT GHL : Header Tracking (de chaque page : Accueil, Avis,

  Ce bloc :
    1. Initialise Google Consent Mode v2 avec TOUS les flags marketing/

    3. Lit le localStorage : si l'utilisateur avait deja accepte lors

  REMPLACE le bloc Meta Pixel actuel dans GHL Header Tracking

  Le bloc <noscript> Pixel est intentionnellement RETIRE : sans JS,
  l'utilisateur ne peut pas voir le banner consent ni cliquer dessus,
  donc aucun tracking ne doit avoir lieu (conformite stricte).

<!-- ===== Loi 25 - Google Consent Mode v2 (default DENIED) ===== -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('consent', 'default', {
    'ad_storage': 'denied',
    'ad_user_data': 'denied',
    'ad_personalization': 'denied',
    'analytics_storage': 'denied',
    'functionality_storage': 'granted',
    'security_storage': 'granted',
    'wait_for_update': 500
  });
</script>

<!-- ===== Meta Pixel - chargement CONDITIONNEL (Loi 25) ===== -->
<script>
  // Definit la fonction de chargement (sera appelee depuis le banner OU
  // automatiquement si consentement deja stocke en localStorage).
  window.ppLoadMetaPixel = function () {
    if (window._ppMetaPixelLoaded) return;
    window._ppMetaPixelLoaded = true;
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () { n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments) };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0'; n.queue = [];
      t = b.createElement(e); t.async = !0; t.src = v;
      s = b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t, s)
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '986179510496466');
    fbq('track', 'PageView');
  };

  // Auto-charge si l'utilisateur avait deja consenti (visite precedente, max 12 mois)
  try {
    var ppRaw = localStorage.getItem('pp_consent_v1');
    var ppDate = parseInt(localStorage.getItem('pp_consent_date_v1') || '0', 10);
    var ppTtl = 12 * 30 * 24 * 60 * 60 * 1000; // 12 mois
    if (ppRaw && ppDate && (Date.now() - ppDate) < ppTtl) {
      var ppC = JSON.parse(ppRaw);
      if (ppC && ppC.marketing === true) {
        window.ppLoadMetaPixel();
        // Update Consent Mode pour les autres outils potentiels
        gtag('consent', 'update', {
          'ad_storage': 'granted',
          'ad_user_data': 'granted',
          'ad_personalization': 'granted',
          'analytics_storage': ppC.analytics ? 'granted' : 'denied'
        });
      } else if (ppC && ppC.analytics === true) {
        gtag('consent', 'update', { 'analytics_storage': 'granted' });
      }
    }
  } catch (e) { /* localStorage indisponible : on attend le banner */ }
</script>
