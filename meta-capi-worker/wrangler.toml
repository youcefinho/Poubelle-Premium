name = "poubelle-meta-capi"
main = "worker.js"
compatibility_date = "2026-01-01"

# Variables publiques (visibles dans le repo, OK)
[vars]
META_PIXEL_ID = "986179510496466"

# Secrets (a configurer via Dashboard Cloudflare ou CLI) :
#   META_ACCESS_TOKEN    -> token CAPI Meta (commence par EAA...)
#   SHARED_SECRET        -> longue chaine aleatoire pour auth Authorization header
#   META_TEST_EVENT_CODE -> OPTIONNEL : code de test pour debug, a virer en prod
#
# Configuration via CLI (depuis ce dossier) :
#   bunx wrangler secret put META_ACCESS_TOKEN
#   bunx wrangler secret put SHARED_SECRET
#
# Configuration via Dashboard :
#   Workers & Pages -> poubelle-meta-capi -> Settings -> Variables -> Add encrypted variable
