<script>
  (function () {
    if (typeof window.switchLang !== 'function') {
      var currentLang = 'fr';
      window.switchLang = function (lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        document.querySelectorAll('.fr-text, .fr-block').forEach(function (el) {
          var d = el.classList.contains('fr-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'fr' ? d : 'none', 'important');
        });
        document.querySelectorAll('.en-text, .en-block').forEach(function (el) {
          var d = el.classList.contains('en-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'en' ? d : 'none', 'important');
        });
        document.querySelectorAll('[data-lang]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-lang') === lang);
        });
        document.documentElement.lang = lang;
        try { localStorage.setItem('pp_lang', lang); } catch (e) { }
      };
    }
    function restoreLang() {
      try {
        var saved = localStorage.getItem('pp_lang');
        var lang = (saved === 'en') ? 'en' : 'fr';
        document.body.classList.remove('lang-fr', 'lang-en');
        document.body.classList.add('lang-' + lang);
        document.documentElement.lang = lang;
        if (lang === 'en' && typeof window.switchLang === 'function') window.switchLang('en');
      } catch (e) {
        document.body.classList.add('lang-fr');
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', restoreLang);
    else restoreLang();

    function patchOldLinks() {
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href') || '';
        if (h === '/' || h === '/index' || h.indexOf('Nettoyage de Bacs') !== -1) {
          a.setAttribute('href', '/accueil_index');
        } else if (h.indexOf('#section-') === 0) {
          a.setAttribute('href', '/accueil_index' + h);
        }
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', patchOldLinks);
    else patchOldLinks();
    setTimeout(patchOldLinks, 1000);
    setTimeout(patchOldLinks, 3000);

    // Click sur iframe Google reviews -> redirige vers /retour apres ouverture nouvel onglet
    var lastIframeClick = 0;
    document.addEventListener('mousedown', function (e) {
      var t = e.target;
      while (t) {
        if (t.id === 'msgsndr_reviews' || (t.tagName === 'IFRAME' && t.src && t.src.indexOf('leadconnectorhq.com/appengine/reviews') >= 0)) {
          lastIframeClick = Date.now();
          break;
        }
        t = t.parentElement;
      }
    }, true);
    window.addEventListener('blur', function () {
      // Cas 1 : on a detecte un mousedown sur l'iframe (browser permissif)
      // Cas 2 : l'iframe msgsndr_reviews est l'element actif au moment du blur
      //   (cross-origin iframe : le mousedown ne fire pas mais focus passe a l'iframe
      //   quand l'user clique dedans avant que window.open ouvre Google)
      var ae = document.activeElement;
      var isReviewIframe = ae && (ae.id === 'msgsndr_reviews' ||
        (ae.tagName === 'IFRAME' && ae.src && ae.src.indexOf('leadconnectorhq.com/appengine/reviews') >= 0));
      if (isReviewIframe || (Date.now() - lastIframeClick < 3000 && ae && ae.tagName === 'IFRAME')) {
        setTimeout(function () { window.location.href = '/retour'; }, 600);
      }
    });

    // Click sur n'importe quel lien Google reviews Poubelle Premium -> redirige
    // (filet pour les CTA dont le onclick inline serait strippe par GHL)
    document.addEventListener('click', function (e) {
      var a = e.target && e.target.closest && e.target.closest('a');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      if (href.indexOf('google.com') < 0) return;
      if (href.indexOf('Poubelle+Premium') < 0 && href.indexOf('ludocid') < 0 && href.indexOf('0xaf3ef64ce9c08449') < 0 && href.indexOf('11tjz8j7cs') < 0) return;
      setTimeout(function () { window.location.href = '/retour'; }, 250);
    });

    // Auto-scroll en haut du sondage Soumission au changement d'etape
    // (demande cliente : chaque "Suivant" doit ramener la vue en haut du form)
    var SURVEY_ID = 'VvEwIFqbMCj3t1kUnB6g';
    var lastIframeHeight = 0;
    var scrollTimer = null;
    function scrollToSurvey() {
      var iframe = document.getElementById(SURVEY_ID);
      if (!iframe) return;
      var headerH = (document.querySelector('.header-nav') || document.querySelector('#pp-mobile-header') || {}).offsetHeight || 80;
      var rect = iframe.getBoundingClientRect();
      var top = rect.top + window.pageYOffset - headerH - 20;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }
    function debouncedScroll() {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(scrollToSurvey, 150);
    }
    // Detection 1 : message GHL form_embed.js (pageChange / nextPage / etc.)
    window.addEventListener('message', function (e) {
      if (!e.data) return;
      var d = e.data;
      var isPageChange = false;
      if (typeof d === 'object') {
        if (d.event === 'pageChange' || d.type === 'pageChange') isPageChange = true;
        if (d.event === 'survey:nextPage' || d.event === 'survey:prevPage') isPageChange = true;
        if (d.action === 'pageChange' || d.action === 'next' || d.action === 'previous') isPageChange = true;
        // Form_embed envoie aussi des resize events. Si la hauteur change drastiquement (>50px), c'est un changement d'etape.
        if (typeof d.height === 'number' && Math.abs(d.height - lastIframeHeight) > 50) {
          if (lastIframeHeight > 0) isPageChange = true;
          lastIframeHeight = d.height;
        }
      } else if (typeof d === 'string' && (d.indexOf('page') >= 0 || d.indexOf('step') >= 0)) {
        isPageChange = true;
      }
      if (isPageChange) debouncedScroll();
    });
    // Detection 2 (fallback) : MutationObserver sur la hauteur de l'iframe
    setTimeout(function () {
      var iframe = document.getElementById(SURVEY_ID);
      if (!iframe || typeof MutationObserver === 'undefined') return;
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          if (mutations[i].attributeName === 'style' || mutations[i].attributeName === 'height') {
            debouncedScroll();
            return;
          }
        }
      });
      obs.observe(iframe, { attributes: true, attributeFilter: ['style', 'height'] });
    }, 500);

    // ===== META PIXEL CONVERSION TRACKING + OVERLAY MERCI =====
    // Lead = Thank You URL detection (Plan B fiable, voir GHL Survey Settings -> On Submit Redirect URL : /soumission_1?lead=ok)
    // GHL ne permet pas Show message + Redirect URL en meme temps -> overlay merci custom quand ?lead=ok detecte.
    var ppLeadFired = false;
    var qs = window.location.search || '';
    if (/[?&](lead|completed|merci|thanks)=(ok|1|true)/i.test(qs)) {
      if (typeof fbq === 'function') {
        fbq('track', 'Lead', { content_name: 'Soumission Sondage GHL', content_category: 'devis' });
        ppLeadFired = true; // bloque le postMessage fallback pour eviter un double-tracking
      }
      function showThankYouOverlay() {
        if (document.getElementById('pp-thank-you-overlay')) return;
        var isEn = document.body.classList.contains('lang-en');
        var overlay = document.createElement('div');
        overlay.id = 'pp-thank-you-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;animation:ppFadeIn .25s ease-out;';
        overlay.innerHTML = '' +
          '<style>@keyframes ppFadeIn{from{opacity:0}to{opacity:1}}@keyframes ppPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}</style>' +
          '<div style="background:#fff;border-radius:18px;max-width:560px;width:100%;padding:42px 32px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4);animation:ppPop .35s ease-out;">' +
          '<div style="font-size:64px;line-height:1;margin-bottom:14px;">&#9989;</div>' +
          '<h2 style="font-size:28px;font-weight:800;color:#0d3b66;margin:0 0 14px;">' +
            (isEn ? 'Thank you!' : 'Merci !') +
          '</h2>' +
          '<p style="font-size:17px;color:#374151;line-height:1.55;margin:0 0 26px;">' +
            (isEn
              ? 'Your request has been sent successfully. We will contact you soon.'
              : 'Votre demande a ete envoyee avec succes. Nous vous contacterons bientot.') +
          '</p>' +
          '<button id="pp-thank-you-close" style="background:#FE8800;color:#fff;border:0;border-radius:999px;padding:13px 38px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;box-shadow:0 8px 18px rgba(254,136,0,.35);">' +
            'OK' +
          '</button>' +
          '</div>';
        document.body.appendChild(overlay);
        function closeOverlay() {
          if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
        }
        document.getElementById('pp-thank-you-close').addEventListener('click', closeOverlay);
        overlay.addEventListener('click', function (e) { if (e.target === overlay) closeOverlay(); });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', showThankYouOverlay);
      } else {
        showThankYouOverlay();
      }
      try {
        var clean = window.location.pathname + window.location.hash;
        window.history.replaceState({}, document.title, clean);
      } catch (e) { }
    }
    // Fallback : detection postMessage (au cas ou GHL change de mecanique un jour, on garde au cas ou)
    // ppLeadFired declare plus haut (Plan B le set a true s'il fire en premier).
    window.addEventListener('message', function (e) {
      if (!e.data || ppLeadFired || typeof fbq !== 'function') return;
      var d = e.data;
      var t = '';
      if (typeof d === 'object' && d) {
        t = String(d.type || d.event || d.action || d.name || '');
        if (!t && d.eventName) t = String(d.eventName);
      } else if (typeof d === 'string') {
        t = d;
      }
      if (/survey[:_-]?(complete|submit|finish|done|end)|form[:_-]?submit|submit[:_-]?success|onSubmit|formCompleted/i.test(t)) {
        fbq('track', 'Lead', { content_name: 'Soumission Sondage GHL (postMessage fallback)', content_category: 'devis' });
        ppLeadFired = true;
      }
    });
    // Contact = click sur lien tel:
    var ppContactFired = false;
    document.addEventListener('click', function (e) {
      var a = e.target && e.target.closest && e.target.closest('a[href^="tel:"]');
      if (a && !ppContactFired && typeof fbq === 'function') {
        fbq('track', 'Contact', { content_name: 'Click telephone Soumission' });
        ppContactFired = true;
        setTimeout(function () { ppContactFired = false; }, 5000);
      }
    });
  })();
</script>
