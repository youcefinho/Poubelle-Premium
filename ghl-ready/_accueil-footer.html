<script>
  (function () {
    // Animations custom : on bypass AOS car GHL surcharge .c-column avec
    // opacity:1 !important. On utilise IntersectionObserver + classes pp-anim
    // dont la CSS est dans _accueil-css.css (forcee avec !important).
    function initPPAnim() {
      if (window._ppAnimInitDone) return;
      window._ppAnimInitDone = true;
      var HDR_SEL = 'header, .header-nav, #pp-mobile-header, #pp-mobile-nav, .unihdr';
      function touchesHeader(el) {
        return !!el.closest(HDR_SEL) || !!el.querySelector(HDR_SEL);
      }
      function isAlreadyVisible(el) {
        // Element deja a l'ecran au load -> on le tag PAS (evite flash blanc 1-2s
        // pendant que IntersectionObserver met a jour). Marge 50px pour tolerance.
        var r = el.getBoundingClientRect();
        var vh = window.innerHeight || document.documentElement.clientHeight;
        return r.top < vh - 50 && r.bottom > 0;
      }
      function tag(sel, type, stagger) {
        var idx = 0;
        document.querySelectorAll(sel).forEach(function (el) {
          if (el.classList.contains('pp-anim')) return;
          if (touchesHeader(el)) return;
          if (isAlreadyVisible(el)) return;
          el.classList.add('pp-anim', 'pp-anim-' + type);
          if (stagger) el.style.transitionDelay = ((idx++ % 4) * 80) + 'ms';
        });
      }
      tag('.c-column', 'up', false);
      tag('.c-heading, .c-sub-heading', 'right', true);
      tag('.c-image', 'zoom', true);
      tag('.c-button', 'up', false);
      var els = document.querySelectorAll('.pp-anim');
      if (!els.length) return;
      if ('IntersectionObserver' in window) {
        var obs = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) {
              e.target.classList.add('pp-in');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
        els.forEach(function (el) { obs.observe(el); });
      } else {
        els.forEach(function (el) { el.classList.add('pp-in'); });
      }
      // Filet 3s pour stragglers
      setTimeout(function () {
        document.querySelectorAll('.pp-anim:not(.pp-in)').forEach(function (el) {
          var r = el.getBoundingClientRect();
          if (r.top < window.innerHeight) el.classList.add('pp-in');
        });
      }, 3000);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPPAnim);
    else initPPAnim();

    function initCountOnce() {
      if (window._ppCountInitDone) return;
      window._ppCountInitDone = true;
      var el = document.getElementById('pp-bacs');
      if (!el) { window._ppCountInitDone = false; return; }
      function ppCount(end, dur) {
        var s = null;
        function step(ts) {
          if (!s) s = ts;
          var p = Math.min((ts - s) / dur, 1);
          var e = 1 - Math.pow(1 - p, 3);
          el.textContent = '+' + Math.floor(e * end).toLocaleString('fr-CA');
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
      if ('IntersectionObserver' in window) {
        var fired = false;
        var obs = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting && !fired) {
              fired = true;
              try { ppCount(2450, 2200); } catch (err) {}
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.3 });
        obs.observe(el);
      } else {
        try { ppCount(2450, 2200); } catch (err) {}
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initCountOnce);
    else initCountOnce();
    setTimeout(initCountOnce, 1500);

    function initFaq() {
      var items = document.querySelectorAll('.hl-faq-child');
      if (!items.length) return;
      items.forEach(function (item) {
        var heading = item.querySelector('.hl-faq-child-heading');
        var panel = item.querySelector('.hl-faq-child-panel');
        var icon = item.querySelector('.hl-faq-child-heading-icon');
        if (!heading || !panel) return;
        if (icon) icon.classList.add('fa-chevron-down');
        if (heading._ppFaqBound) return;
        heading._ppFaqBound = true;
        heading.addEventListener('click', function () {
          var isActive = item.classList.contains('active');
          items.forEach(function (other) {
            if (other === item) return;
            other.classList.remove('active');
            var op = other.querySelector('.hl-faq-child-panel');
            var oi = other.querySelector('.hl-faq-child-heading-icon');
            if (op) { op.style.height = '0'; op.style.padding = '0 20px'; op.style.opacity = '0'; op.style.marginBottom = '0'; }
            if (oi) oi.style.transform = 'rotate(0deg)';
          });
          if (isActive) {
            item.classList.remove('active');
            panel.style.height = '0';
            panel.style.padding = '0 20px';
            panel.style.opacity = '0';
            panel.style.marginBottom = '0';
            if (icon) icon.style.transform = 'rotate(0deg)';
          } else {
            item.classList.add('active');
            panel.style.height = 'auto';
            panel.style.padding = '10px 20px 25px 20px';
            panel.style.opacity = '1';
            panel.style.marginBottom = '10px';
            var h = panel.scrollHeight + 'px';
            panel.style.height = '0';
            setTimeout(function () { panel.style.height = h; }, 10);
            if (icon) icon.style.transform = 'rotate(180deg)';
          }
        });
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initFaq);
    else initFaq();

    if (typeof window.switchLang !== 'function') {
      var currentLang = 'fr';
      window.switchLang = function (lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        document.querySelectorAll('.fr-text, .fr-block').forEach(function (el) {
          var d = el.classList.contains('fr-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'fr' ? d : 'none', 'important');
        });
        document.querySelectorAll('.en-text, .en-block').forEach(function (el) {
          var d = el.classList.contains('en-block') ? 'block' : 'inline';
          el.style.setProperty('display', lang === 'en' ? d : 'none', 'important');
        });
        document.querySelectorAll('[data-lang]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-lang') === lang);
        });
        document.documentElement.lang = lang;
        try { localStorage.setItem('pp_lang', lang); } catch (e) { }
      };
    }
    function restoreLang() {
      try {
        var saved = localStorage.getItem('pp_lang');
        var lang = (saved === 'en') ? 'en' : 'fr';
        document.body.classList.remove('lang-fr', 'lang-en');
        document.body.classList.add('lang-' + lang);
        document.documentElement.lang = lang;
        if (lang === 'en' && typeof window.switchLang === 'function') window.switchLang('en');
      } catch (e) {
        document.body.classList.add('lang-fr');
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', restoreLang);
    else restoreLang();

    function initSwiper() {
      if (typeof Swiper === 'undefined') return false;
      var el = document.querySelector('.ss-swiper');
      if (!el || el._ppSwiperInit) return true;
      el._ppSwiperInit = true;
      try {
        new Swiper('.ss-swiper', {
          slidesPerView: 1,
          spaceBetween: 24,
          loop: true,
          autoplay: { delay: 3500, disableOnInteraction: false },
          pagination: { el: '.ss-swiper .swiper-pagination', clickable: true },
          navigation: {
            nextEl: '.ss-swiper-outer .swiper-button-next',
            prevEl: '.ss-swiper-outer .swiper-button-prev'
          },
          breakpoints: { 640: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } }
        });
      } catch (e) { }
      return true;
    }
    var swTries = 0;
    var swIv = setInterval(function () {
      if (initSwiper() || swTries++ > 30) clearInterval(swIv);
    }, 100);

    function smartScrollServices() {
      var h = location.hash;
      if (h !== '#section-Q-QVu_CWVt' && h !== '#section-dOhNthRMRr' && h !== '#services-section') return;
      var sections = document.querySelectorAll('.services-section-premium');
      var visible = null;
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].offsetParent !== null) { visible = sections[i]; break; }
      }
      if (!visible) return;
      setTimeout(function () {
        var headerH = (document.querySelector('.header-nav') || {}).offsetHeight || 80;
        var top = visible.getBoundingClientRect().top + window.pageYOffset - headerH - 20;
        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      }, 200);
    }
    window.addEventListener('hashchange', smartScrollServices);
    if (location.hash) setTimeout(smartScrollServices, 400);

    // Click sur iframe Google reviews -> redirige vers /retour apres ouverture nouvel onglet
    var lastIframeClick = 0;
    document.addEventListener('mousedown', function (e) {
      var t = e.target;
      while (t) {
        if (t.id === 'msgsndr_reviews' || (t.tagName === 'IFRAME' && t.src && t.src.indexOf('leadconnectorhq.com/appengine/reviews') >= 0)) {
          lastIframeClick = Date.now();
          break;
        }
        t = t.parentElement;
      }
    }, true);
    window.addEventListener('blur', function () {
      var ae = document.activeElement;
      var isReviewIframe = ae && (ae.id === 'msgsndr_reviews' ||
        (ae.tagName === 'IFRAME' && ae.src && ae.src.indexOf('leadconnectorhq.com/appengine/reviews') >= 0));
      if (isReviewIframe || (Date.now() - lastIframeClick < 3000 && ae && ae.tagName === 'IFRAME')) {
        setTimeout(function () { window.location.href = '/retour'; }, 600);
      }
    });

    // Click sur n'importe quel lien Google reviews Poubelle Premium -> redirige
    // (filet pour les CTA dont le onclick inline serait strippe par GHL)
    document.addEventListener('click', function (e) {
      var a = e.target && e.target.closest && e.target.closest('a');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      if (href.indexOf('google.com') < 0) return;
      if (href.indexOf('Poubelle+Premium') < 0 && href.indexOf('ludocid') < 0 && href.indexOf('0xaf3ef64ce9c08449') < 0 && href.indexOf('11tjz8j7cs') < 0) return;
      setTimeout(function () { window.location.href = '/retour'; }, 250);
    });

    // ===== META PIXEL CONVERSION TRACKING =====
    // Contact = click sur lien tel: (anti-doublon via flag pour eviter spam si user clique 2x)
    var ppContactFired = false;
    document.addEventListener('click', function (e) {
      var a = e.target && e.target.closest && e.target.closest('a[href^="tel:"]');
      if (a && !ppContactFired && typeof fbq === 'function') {
        fbq('track', 'Contact', { content_name: 'Click telephone Accueil' });
        ppContactFired = true;
        setTimeout(function () { ppContactFired = false; }, 5000); // re-armer apres 5s
      }
    });
  })();
</script>
